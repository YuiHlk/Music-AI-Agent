spring:
  datasource:
    url: jdbc:h2:mem:music_ai_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

music-ai:
  export-directory: ${java.io.tmpdir}/music-ai-test-exports
  deepseek:
    base-url: https://api.deepseek.com
    model-name: deepseek-v4-flash
    api-key: ${DEEPSEEK_API_KEY:}
