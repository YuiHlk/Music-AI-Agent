spring:
  datasource:
    url: jdbc:h2:mem:music_ai_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

music-ai:
  export-directory: ${java.io.tmpdir}/music-ai-test-exports
  llm:
    provider: ${LLM_PROVIDER:deepseek}
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    model-name: ${LLM_MODEL:deepseek-v4-flash}
    api-key: ${LLM_API_KEY:}
